<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthStar Memorial Group — SLA Performance Report</title>
<style>
  :root {
    /* Fluent UI Palette (Light Theme) */
    --bg: #faf9f8;
    --surface: #ffffff;
    --surface2: #f3f2f1;
    --border: #e1dfdd;
    --border-hover: #c8c6c4;
    
    /* Fluent Accent Colors (Brand & Status) */
    --accent: #0f6cbd;      /* Brand / Primary (Blue) */
    --accent-hover: #115ea3;
    --red: #e57373;         /* Lighter Red */
    --severe-red: #d13438;  /* Target Red */
    --yellow: #ffb74d;      /* Lighter Yellow */
    --green: #107c10;       /* Success */
    
    /* Text */
    --text: #242424;        /* Primary text */
    --muted: #616161;       /* Secondary text */
    
    /* Fonts and Shadows */
    --font: 'Segoe UI', 'Segoe UI Web (West European)', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
    --mono: Consolas, 'Courier New', monospace;
    --shadow-card: 0px 1.6px 3.6px rgba(0, 0, 0, 0.13), 0px 0.3px 0.9px rgba(0, 0, 0, 0.11);
    --shadow-flyout: 0px 6.4px 14.4px rgba(0, 0, 0, 0.13), 0px 1.2px 3.6px rgba(0, 0, 0, 0.11);
    
    /* Fluent v9 Radii */
    --radius-control: 4px;
    --radius-card: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .report-title {
    font-size: 14px;
    color: var(--muted);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge {
    background: #f0f6fc;
    color: var(--accent);
    padding: 4px 12px;
    border-radius: var(--radius-control);
    font-size: 12px;
    font-weight: 600;
  }
  .last-refresh {
    font-size: 12px;
    color: var(--muted);
  }
  
  /* Fluent Buttons */
  .export-btn {
    background: var(--accent);
    color: #ffffff;
    border: 1px solid transparent;
    padding: 6px 16px;
    border-radius: var(--radius-control);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.2s ease;
  }
  .export-btn:hover { background: var(--accent-hover); }

  /* Filters Panel */
  .filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .filter-group { display: flex; align-items: center; gap: 12px; }
  .filter-label { 
    font-size: 13px; 
    color: var(--text); 
    font-weight: 500;
  }
  
  /* Fluent Selects */
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 32px 6px 12px;
    border-radius: var(--radius-control);
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    outline: none;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2012%2012%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M2.22%204.22a.75.75%200%20011.06%200L6%206.94l2.72-2.72a.75.75%200%20111.06%201.06l-3.25%203.25a.75.75%200%2001-1.06%200L2.22%205.28a.75.75%200%20010-1.06z%22%20fill%3D%22%23616161%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    transition: border-color 0.2s ease;
  }
  .filter-select:hover { border-color: var(--border-hover); }
  .filter-select:focus { 
    border-color: var(--accent); 
    outline: 1px solid var(--accent);
    outline-offset: -1px;
  }
  .filter-sep { width: 1px; height: 24px; background: var(--border); }

  /* Main Layout */
  .main { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .panel-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .panel-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .panel-body { padding: 24px 20px; }

  /* Grid Layout for Single Chart */
  .chart-full-width {
    width: 100%;
    min-width: 0;
  }

  /* CHART WRAPPER */
  .chart-container {
    position: relative;
    width: 100%;
    height: 500px;
  }

  /* Legend */
  .legend-item { display: flex; align-items: center; gap: 8px; }
  .legend-box { width: 14px; height: 14px; border-radius: 3px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  .legend-lbl { font-size: 13px; color: var(--text); font-weight: 500; }

  /* Data Table */
  .table-container { max-height: 350px; overflow-y: auto; border-bottom: 1px solid var(--border); }
  .data-table { width: 100%; border-collapse: collapse; text-align: left; }
  .data-table th { position: sticky; top: 0; z-index: 10; padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); font-weight: 600; background: var(--surface2); }
  .data-table td { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text); }
  .data-table tr:hover { background: #fdfdfd; }
  .status-breach { color: var(--severe-red); font-weight: 600; background: rgba(209, 52, 56, 0.1); padding: 2px 6px; border-radius: 4px; }

  /* Footer */
  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
  }

</style>
</head>
<body>



<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-group">
    <span class="filter-label">Region</span>
    <select class="filter-select" id="regionFilter">
      <option value="all" selected>All Regions</option>
      <option value="florida">Florida</option>
      <option value="memorial_plan">Memorial Plan</option>
      <option value="northern_pacific">Northern Pacific</option>
      <option value="red_river">Red River</option>
      <option value="west">West</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Material</span>
    <select class="filter-select" id="materialFilter">
      <option value="all">All Materials</option>
      <option value="granite">Granite</option>
      <option value="bronze">Bronze</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Milestone</span>
    <select class="filter-select" id="milestoneFilter">
      <option value="all" selected>All Milestones</option>
      <option value="sketch_received">Sketch Received</option>
      <option value="sketch_approved">Sketch Approved</option>
      <option value="memorial_received">Memorial Received</option>
      <option value="iwo_completed">Installation Work Order Completed</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Stage</span>
    <select class="filter-select" id="stageFilter">
      <option value="all" selected>All Stages</option>
      <option value="Sketch Requested">Sketch Requested</option>
      <option value="Sketch Received">Sketch Received</option>
      <option value="Sketch Approved">Sketch Approved</option>
      <option value="Vendor Confirmation">Vendor Confirmation</option>
      <option value="Memorial Received">Memorial Received</option>
      <option value="IWO Submitted">IWO Submitted</option>
      <option value="IWO Completed">IWO Completed</option>
    </select>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- SINGLE CONSOLIDATED CHART PANEL -->
  <div class="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panelTitle">SLA Target vs Average Time</div>
      </div>
    </div>
    <div class="panel-body">
      
      <!-- Custom Legend matching the new visual style -->
      <div style="display:flex; gap:32px; align-items:center; justify-content: center; margin-bottom: 24px;">
        <div class="legend-item">
          <div class="legend-box" style="background:#e1dfdd;"></div>
          <span class="legend-lbl">SLA Target</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#0f6cbd;"></div>
          <span class="legend-lbl">Average Time</span>
        </div>
      </div>

      <div class="chart-full-width">
        <div class="chart-container"><canvas id="mainChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- SLA BREACH EXPORT TABLE PANEL -->
  <div class="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title">SLA Breach Details</div>
      </div>
      <div>
        <button class="export-btn" onclick="exportToCSV()">Export to Excel</button>
      </div>
    </div>
    <div class="panel-body" style="padding: 0;">
      <div class="table-container">
        <table class="data-table" id="breachTable">
          <thead>
            <tr>
              <th>Case Title</th>
              <th>Case Number</th>
              <th>Marker Type</th>
              <th>Location</th>
              <th>Customer</th>
              <th>Days in Stage</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Rows will be populated by JS based on filters -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// Data Configuration
const stageTrendsConfig = {
  'sketch_received': {
    title: 'Milestone: Sketch Received',
    stages: [
      { name: 'Sketch Requested', sla: 5, avg: 7.2 },
      { name: 'Sketch Received', sla: 10, avg: 13.5 },
      { name: 'Sketch Approved', sla: 2, avg: 4.1 }
    ],
    medianData: [10, 20, 8.5],
    casesData: [120, 85, 45]
  },
  'sketch_approved': {
    title: 'Milestone: Sketch Approved',
    stages: [
      { name: 'Sketch Received', sla: 2, avg: 4.8 },
      { name: 'Sketch Approved', sla: 2, avg: 4.5 }
    ],
    medianData: [8, 10],
    casesData: [92, 40]
  },
  'memorial_received': {
    title: 'Milestone: Memorial Received',
    stages: [
      { name: 'Vendor Confirmation', sla: 2, avg: 3.4 },
      { name: 'Memorial Received', sla: 3, avg: 5.8 },
      { name: 'IWO Submitted', sla: 3, avg: 4.2 }
    ],
    medianData: [6, 12, 9],
    casesData: [45, 38, 30]
  },
  'iwo_completed': {
    title: 'Milestone: Installation Work Order Completed',
    stages: [
      { name: 'Vendor Confirmation', sla: 3, avg: 5.1 },
      { name: 'Memorial Received', sla: 21, avg: 26.5 },
      { name: 'IWO Submitted', sla: 7, avg: 10.2 },
      { name: 'IWO Completed', sla: 2, avg: 4.8 }
    ],
    medianData: [8, 40, 15, 7],
    casesData: [15, 42, 20, 12]
  }
};

// Mock Data for the Table
const mockTableData = [
  { caseTitle: 'Smith Memorial', region: 'west', contract: 'CON-98231', family: 'Smith', mat: 'Granite', vendor: 'Coldspring', stage: 'Sketch Received', days: 16, sla: 10, milestone: 'sketch_received', loc: 'Skylawn Memorial Park' },
  { caseTitle: 'Johnson Bronze', region: 'red_river', contract: 'CON-98245', family: 'Johnson', mat: 'Bronze', vendor: 'Matthews', stage: 'Memorial Received', days: 34, sla: 21, milestone: 'memorial_received', loc: 'Restland Funeral Home' },
  { caseTitle: 'Williams Upright', region: 'northern_pacific', contract: 'CON-98288', family: 'Williams', mat: 'Granite', vendor: 'Eagle Granite', stage: 'Sketch Requested', days: 14, sla: 5, milestone: 'sketch_received', loc: 'Valley of the Temples' },
  { caseTitle: 'Davis Flat Marker', region: 'florida', contract: 'CON-98302', family: 'Davis', mat: 'Bronze', vendor: 'Matthews', stage: 'IWO Completed', days: 7, sla: 2, milestone: 'iwo_completed', loc: 'Sunset Funeral Home' },
  { caseTitle: 'Miller Estate', region: 'memorial_plan', contract: 'CON-98315', family: 'Miller', mat: 'Granite', vendor: 'Coldspring', stage: 'Sketch Approved', days: 6, sla: 2, milestone: 'sketch_approved', loc: 'Chapel of the Chimes' },
  { caseTitle: 'Taylor Companion', region: 'west', contract: 'CON-98400', family: 'Taylor', mat: 'Bronze', vendor: 'Matthews', stage: 'Vendor Confirmation', days: 6, sla: 3, milestone: 'memorial_received', loc: 'Chapel of the Light' },
  { caseTitle: 'Brown Custom', region: 'red_river', contract: 'CON-98410', family: 'Brown', mat: 'Granite', vendor: 'Star Granite', stage: 'IWO Submitted', days: 12, sla: 7, milestone: 'iwo_completed', loc: 'Restland Funeral Home' },
  { caseTitle: 'Wilson Ledger', region: 'northern_pacific', contract: 'CON-98450', family: 'Wilson', mat: 'Bronze', vendor: 'Matthews', stage: 'Sketch Received', days: 15, sla: 10, milestone: 'sketch_received', loc: 'Maui Memorial Park' },
  { caseTitle: 'Moore Slant', region: 'west', contract: 'CON-98501', family: 'Moore', mat: 'Granite', vendor: 'Coldspring', stage: 'Memorial Received', days: 28, sla: 21, milestone: 'memorial_received', loc: 'Skylawn Memorial Park' },
  { caseTitle: 'Anderson Plaque', region: 'florida', contract: 'CON-98555', family: 'Anderson', mat: 'Bronze', vendor: 'Matthews', stage: 'Vendor Confirmation', days: 5, sla: 2, milestone: 'memorial_received', loc: 'Sunset Funeral Home' },
  { caseTitle: 'Thomas Bench', region: 'red_river', contract: 'CON-98602', family: 'Thomas', mat: 'Granite', vendor: 'Eagle Granite', stage: 'Sketch Requested', days: 9, sla: 5, milestone: 'sketch_received', loc: 'Restland Funeral Home' },
  { caseTitle: 'Jackson Bronze', region: 'memorial_plan', contract: 'CON-98610', family: 'Jackson', mat: 'Bronze', vendor: 'Matthews', stage: 'IWO Submitted', days: 9, sla: 3, milestone: 'memorial_received', loc: 'Chapel of the Chimes' }
];

let mainChart = null;

function renderChart(milestoneVal, stageVal) {
  let combinedStages = [];
  let combinedMedian = []; // We keep the variable name but it reflects Average Data in UI
  let combinedCases = [];
  let currentTitle = "Consolidated SLA Target vs Average Time";

  if (milestoneVal === 'all') {
    const seenStages = new Set();
    Object.keys(stageTrendsConfig).forEach(key => {
      const config = stageTrendsConfig[key];
      config.stages.forEach((stage, idx) => {
        if (!seenStages.has(stage.name)) {
          seenStages.add(stage.name);
          combinedStages.push(stage);
          combinedMedian.push(config.medianData[idx]);
          combinedCases.push(config.casesData[idx]);
        }
      });
    });
  } else if (stageTrendsConfig[milestoneVal]) {
    const config = stageTrendsConfig[milestoneVal];
    combinedStages = config.stages;
    combinedMedian = config.medianData;
    combinedCases = config.casesData;
    currentTitle = config.title;
  }

  // Filter Chart by Stage if selected
  if (stageVal !== 'all') {
    const filteredStages = [];
    const filteredMedian = [];
    const filteredCases = [];
    combinedStages.forEach((stage, idx) => {
      if (stage.name === stageVal) {
        filteredStages.push(stage);
        filteredMedian.push(combinedMedian[idx]);
        filteredCases.push(combinedCases[idx]);
      }
    });
    combinedStages = filteredStages;
    combinedMedian = filteredMedian;
    combinedCases = filteredCases;
    currentTitle += ` (Filtered: ${stageVal})`;
  }

  document.getElementById('panelTitle').innerText = currentTitle;

  const labels = combinedStages.map(s => s.name);
  const combinedSla = combinedStages.map(s => s.sla);
  const maxDays = combinedMedian.length ? Math.max(...combinedMedian, ...combinedSla) : 0;

  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();

  if (combinedStages.length === 0) return; // Hide chart if no data matches

  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          type: 'bar',
          label: 'SLA Target',
          data: combinedSla,
          backgroundColor: '#e1dfdd',
          borderRadius: 4,
          barPercentage: 0.35,
          order: 2
        },
        {
          type: 'line',
          label: 'Average Time',
          data: combinedMedian,
          cases: combinedCases,
          backgroundColor: '#0f6cbd',
          borderColor: '#ffffff',
          borderWidth: 2,
          pointRadius: 7,
          pointHoverRadius: 9,
          showLine: false,
          order: 1
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          min: 0,
          max: Math.ceil(maxDays / 5) * 5 + 5,
          grid: { color: 'rgba(0,0,0,0.05)', drawBorder: false },
          border: { display: false },
          ticks: { color: '#616161', font: { family: 'Segoe UI', size: 11 }, callback: v => v + 'd', stepSize: 5 },
          title: { display: true, text: 'Days', color: '#616161', font: { size: 10, family: 'Segoe UI' } }
        },
        y: {
          grid: { display: false, drawBorder: false },
          border: { display: false },
          ticks: { color: '#242424', font: { family: 'Segoe UI', size: 12, weight: '500' } }
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(36, 36, 36, 0.95)',
          titleColor: '#ffffff',
          bodyColor: '#f3f2f1',
          footerColor: '#c8c6c4',
          padding: 12,
          boxPadding: 8,
          usePointStyle: true,
          callbacks: {
            title: items => items[0].label,
            label: item => ` ${item.dataset.label}: ${item.raw}d`,
            footer: items => {
              const cases = items[0].chart.config.data.datasets[1].cases[items[0].dataIndex];
              return `\nTotal Cases: ${cases}`;
            }
          }
        }
      },
      animation: { duration: 700 }
    }
  });
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 24px; color:#616161;">No breached cases found for the selected filters.</td></tr>';
    return;
  }

  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${row.caseTitle}</td>
      <td>${row.contract}</td>
      <td>${row.mat}</td>
      <td>${row.loc}</td>
      <td>${row.family}</td>
      <td><span class="status-breach">${row.days} days</span></td>
    `;
    tbody.appendChild(tr);
  });
}

function exportToCSV() {
  const table = document.getElementById('breachTable');
  let csv = [];
  
  // Parse Table Rows
  for (let i = 0; i < table.rows.length; i++) {
    let row = [], cols = table.rows[i].querySelectorAll('td, th');
    for (let j = 0; j < cols.length; j++) {
      let data = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, '').trim();
      data = data.replace(/"/g, '""'); // Escape double quotes
      row.push('"' + data + '"');
    }
    csv.push(row.join(','));
  }
  
  // Create and Download CSV File
  const csvFile = new Blob([csv.join('\n')], {type: 'text/csv;charset=utf-8;'});
  const downloadLink = document.createElement('a');
  downloadLink.download = 'SLA_Breach_Report.csv';
  downloadLink.href = window.URL.createObjectURL(csvFile);
  downloadLink.style.display = 'none';
  document.body.appendChild(downloadLink);
  downloadLink.click();
  document.body.removeChild(downloadLink);
}

function applyFilters() {
  const regionVal = document.getElementById('regionFilter').value;
  const materialVal = document.getElementById('materialFilter').value;
  const milestoneVal = document.getElementById('milestoneFilter').value;
  const stageVal = document.getElementById('stageFilter').value;

  // 1. Render Chart Based on Milestone & Stage
  renderChart(milestoneVal, stageVal);

  // 2. Filter & Render Table Data
  const filteredData = mockTableData.filter(d => {
    const matchRegion = (regionVal === 'all') || (d.region === regionVal);
    // Делаем проверку материала нечувствительной к регистру (Granite == granite)
    const matchMaterial = (materialVal === 'all') || (d.mat.toLowerCase() === materialVal.toLowerCase());
    const matchMilestone = (milestoneVal === 'all') || (d.milestone === milestoneVal);
    const matchStage = (stageVal === 'all') || (d.stage === stageVal);
    
    return matchRegion && matchMaterial && matchMilestone && matchStage;
  });

  renderTable(filteredData);
}

document.addEventListener('DOMContentLoaded', function() {
  // Initial Load
  applyFilters();

  // Attach Listeners to all filters
  document.getElementById('regionFilter').addEventListener('change', applyFilters);
  document.getElementById('materialFilter').addEventListener('change', applyFilters);
  document.getElementById('milestoneFilter').addEventListener('change', applyFilters);
  document.getElementById('stageFilter').addEventListener('change', applyFilters);
});
</script>
</body>
</html>
