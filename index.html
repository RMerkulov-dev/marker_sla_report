<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NorthStar Memorial Group — SLA Performance Report</title>
<style>
  :root {
    /* Fluent UI Palette (Light Theme) */
    --bg: #faf9f8;
    --surface: #ffffff;
    --surface2: #f3f2f1;
    --border: #e1dfdd;
    --border-hover: #c8c6c4;
    
    /* Fluent Accent Colors (Brand & Status) */
    --accent: #0f6cbd;      /* Brand / Primary (Blue) */
    --accent-hover: #115ea3;
    --red: #e57373;         /* Lighter Red */
    --severe-red: #d13438;  /* Target Red */
    --yellow: #ffb74d;      /* Lighter Yellow */
    --green: #107c10;       /* Success */
    
    /* Text */
    --text: #242424;        /* Primary text */
    --muted: #616161;       /* Secondary text */
    
    /* Fonts and Shadows */
    --font: 'Segoe UI', 'Segoe UI Web (West European)', -apple-system, BlinkMacSystemFont, Roboto, 'Helvetica Neue', sans-serif;
    --mono: Consolas, 'Courier New', monospace;
    --shadow-card: 0px 1.6px 3.6px rgba(0, 0, 0, 0.13), 0px 0.3px 0.9px rgba(0, 0, 0, 0.11);
    --shadow-flyout: 0px 6.4px 14.4px rgba(0, 0, 0, 0.13), 0px 1.2px 3.6px rgba(0, 0, 0, 0.11);
    
    /* Fluent v9 Radii */
    --radius-control: 4px;
    --radius-card: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }
  .report-title {
    font-size: 14px;
    color: var(--muted);
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .badge {
    background: #f0f6fc;
    color: var(--accent);
    padding: 4px 12px;
    border-radius: var(--radius-control);
    font-size: 12px;
    font-weight: 600;
  }
  .last-refresh {
    font-size: 12px;
    color: var(--muted);
  }
  
  /* Fluent Buttons */
  .export-btn {
    background: var(--accent);
    color: #ffffff;
    border: 1px solid transparent;
    padding: 6px 16px;
    border-radius: var(--radius-control);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: background 0.2s ease;
  }
  .export-btn:hover { background: var(--accent-hover); }

  /* Filters Panel */
  .filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .filter-group { display: flex; align-items: center; gap: 12px; }
  .filter-label { 
    font-size: 13px; 
    color: var(--text); 
    font-weight: 500;
  }
  
  /* Fluent Selects */
  .filter-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 32px 6px 12px;
    border-radius: var(--radius-control);
    font-size: 14px;
    font-family: var(--font);
    cursor: pointer;
    outline: none;
    appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2212%22%20height%3D%2212%22%20viewBox%3D%220%200%2012%2012%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M2.22%204.22a.75.75%200%20011.06%200L6%206.94l2.72-2.72a.75.75%200%20111.06%201.06l-3.25%203.25a.75.75%200%2001-1.06%200L2.22%205.28a.75.75%200%20010-1.06z%22%20fill%3D%22%23616161%22%2F%3E%3C%2Fsvg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
    transition: border-color 0.2s ease;
  }
  .filter-select:hover { border-color: var(--border-hover); }
  .filter-select:focus { 
    border-color: var(--accent); 
    outline: 1px solid var(--accent);
    outline-offset: -1px;
  }
  .filter-sep { width: 1px; height: 24px; background: var(--border); }

  /* Main Layout */
  .main { padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* Panels */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .panel-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .panel-subtitle { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .panel-body { padding: 24px 20px; }

  /* Grid Layout for Single Chart */
  .chart-full-width {
    width: 100%;
    min-width: 0;
  }

  /* CHART WRAPPER */
  .chart-container {
    position: relative;
    width: 100%;
    height: 500px;
  }

  /* Legend */
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 20px; height: 3px; border-radius: 2px; }
  .legend-box { width: 14px; height: 14px; border-radius: 2px; }
  .legend-line.dashed-red { border-top: 2px dashed var(--severe-red); height: 0; background: transparent; width: 20px; }
  .legend-line.dashed-blue { border-top: 2px dashed var(--accent); height: 0; background: transparent; width: 20px; }
  .legend-lbl { font-size: 12px; color: var(--text); }

  /* Footer */
  footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
  }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">NorthStar Memorial Group</div>
    <div class="report-title">/ SLA Performance Report</div>
    <div class="badge">WEEKLY</div>
  </div>
  <div class="header-right">
    <span class="last-refresh">Last refresh: March 10, 2026 · 06:00 AM</span>
    <button class="export-btn" onclick="alert('Export triggered')">Export Data</button>
  </div>
</div>

<!-- FILTERS -->
<div class="filters-bar">
  <div class="filter-group">
    <span class="filter-label">Region</span>
    <select class="filter-select">
      <option value="all">All Regions</option>
      <option value="red_river" selected>Red River Region</option>
      <option value="west">West Region (CA/WA)</option>
      <option value="south">South Region</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Material</span>
    <select class="filter-select">
      <option value="all">All Materials</option>
      <option value="granite">Granite</option>
      <option value="bronze">Bronze</option>
    </select>
  </div>
  <div class="filter-sep"></div>
  <div class="filter-group">
    <span class="filter-label">Milestone</span>
    <select class="filter-select" id="milestoneFilter">
      <option value="all" selected>All Milestones</option>
      <option value="sketch_received">Sketch Received</option>
      <option value="sketch_approved">Sketch Approved</option>
      <option value="memorial_received">Memorial Received</option>
      <option value="iwo_completed">Installation Work Order Completed</option>
    </select>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- SINGLE CONSOLIDATED CHART PANEL -->
  <div class="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panelTitle">Consolidated Median Days & SLA</div>
  
      </div>
      <div style="display:flex; gap:16px; align-items:center;">
        <div class="legend-item"><div class="legend-line dashed-red"></div><span class="legend-lbl">SLA Limit</span></div>
        <div class="filter-sep" style="height: 16px;"></div>
        <div class="legend-item"><div class="legend-line dashed-blue"></div><span class="legend-lbl">Overall Median</span></div>
      </div>
    </div>
    <div class="panel-body">
      <div class="chart-full-width">
        <div class="chart-container"><canvas id="mainChart"></canvas></div>
      </div>
    </div>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <span>NorthStar Memorial Group · SLA Performance Report</span>
  <span>Data source: Case Management System · Red River Region</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// Data Configuration
const stageTrendsConfig = {
  'sketch_received': {
    title: 'Milestone: Sketch Received',
    stages: [
      { name: 'Sketch Requested', sla: 5, avg: 7.2 },
      { name: 'Sketch Received', sla: 10, avg: 13.5 },
      { name: 'Sketch Approved', sla: 2, avg: 4.1 }
    ],
    medianData: [10, 20, 8.5],
    casesData: [120, 85, 45]
  },
  'sketch_approved': {
    title: 'Milestone: Sketch Approved',
    stages: [
      { name: 'Sketch Received', sla: 2, avg: 4.8 },
      { name: 'Sketch Approved', sla: 2, avg: 4.5 }
    ],
    medianData: [8, 10],
    casesData: [92, 40]
  },
  'memorial_received': {
    title: 'Milestone: Memorial Received',
    stages: [
      { name: 'Vendor Confirmation', sla: 2, avg: 3.4 },
      { name: 'Memorial Received', sla: 3, avg: 5.8 },
      { name: 'IWO Submitted', sla: 3, avg: 4.2 }
    ],
    medianData: [6, 12, 9],
    casesData: [45, 38, 30]
  },
  'iwo_completed': {
    title: 'Milestone: Installation Work Order Completed',
    stages: [
      { name: 'Vendor Confirmation', sla: 3, avg: 5.1 },
      { name: 'Memorial Received', sla: 21, avg: 26.5 },
      { name: 'IWO Submitted', sla: 7, avg: 10.2 },
      { name: 'IWO Completed', sla: 2, avg: 4.8 }
    ],
    medianData: [8, 40, 15, 7],
    casesData: [15, 42, 20, 12]
  }
};

// Benchmark plugin
const benchmarkLinesPlugin = {
  id: 'benchmarkLinesPlugin',
  afterDatasetsDraw(chart) {
    const { ctx, chartArea, scales } = chart;
    const yAxis = scales.y;
    const stagesConfig = chart.config.data.stagesConfig;
    if (!stagesConfig) return;

    ctx.save();
    const meta = chart.getDatasetMeta(0);
    
    meta.data.forEach((bar, index) => {
      const config = stagesConfig[index];
      if (!config) return;
      
      const xCenter = bar.x;
      const width = bar.width;
      const padding = 12;
      const startX = xCenter - (width / 2) - padding;
      const endX = xCenter + (width / 2) + padding;

      // 1. SLA Line (Red Dashed)
      const ySla = yAxis.getPixelForValue(config.sla);
      if (ySla >= chartArea.top && ySla <= chartArea.bottom) {
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#d13438';
        ctx.lineWidth = 2;
        ctx.moveTo(startX, ySla);
        ctx.lineTo(endX, ySla);
        ctx.stroke();
      }

      // 2. Overall Median Line (Blue Dashed)
      const yAvg = yAxis.getPixelForValue(config.avg);
      if (yAvg >= chartArea.top && yAvg <= chartArea.bottom) {
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#0f6cbd';
        ctx.lineWidth = 2;
        ctx.moveTo(startX, yAvg);
        ctx.lineTo(endX, yAvg);
        ctx.stroke();
      }
    });
    ctx.restore();
  }
};

Chart.register(benchmarkLinesPlugin);

let mainChart = null;

function renderChart(filterValue) {
  let combinedStages = [];
  let combinedMedian = [];
  let combinedCases = [];
  let currentTitle = "Consolidated Median Days & SLA";

  if (filterValue === 'all') {
    const seenStages = new Set();
    
    // Iterate through all milestones to collect unique stages
    Object.keys(stageTrendsConfig).forEach(key => {
      const config = stageTrendsConfig[key];
      config.stages.forEach((stage, idx) => {
        // Remove duplicates by stage name to maintain a clean linear flow
        if (!seenStages.has(stage.name)) {
          seenStages.add(stage.name);
          combinedStages.push(stage);
          combinedMedian.push(config.medianData[idx]);
          combinedCases.push(config.casesData[idx]);
        }
      });
    });
  } else if (stageTrendsConfig[filterValue]) {
    const config = stageTrendsConfig[filterValue];
    combinedStages = config.stages;
    combinedMedian = config.medianData;
    combinedCases = config.casesData;
    currentTitle = config.title;
  }

  document.getElementById('panelTitle').innerText = currentTitle;

  const labels = combinedStages.map(s => s.name);
  const benchmarkValues = combinedStages.flatMap(s => [s.sla, s.avg]);
  const maxDays = Math.max(...combinedMedian, ...benchmarkValues);

  const ctx = document.getElementById('mainChart').getContext('2d');

  if (mainChart) {
    mainChart.destroy();
  }

  mainChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      stagesConfig: combinedStages,
      datasets: [{
        label: 'Median Days',
        data: combinedMedian,
        cases: combinedCases,
        backgroundColor: 'rgba(229, 115, 115, 0.5)',
        borderRadius: { topLeft: 4, topRight: 4, bottomLeft: 0, bottomRight: 0 },
        barPercentage: 0.6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        x: {
          grid: { display: false },
          border: { color: '#e1dfdd' },
          ticks: {
            color: '#616161',
            font: { family: 'Segoe UI', size: 11, weight: '500' },
            maxRotation: 45,
            minRotation: 0,
            autoSkip: false
          }
        },
        y: {
          min: 0,
          max: Math.ceil(maxDays / 5) * 5 + 2,
          ticks: {
            color: '#616161',
            font: { family: 'Segoe UI', size: 10 },
            callback: v => v + 'd',
            stepSize: 5,
          },
          grid: { color: 'rgba(0,0,0,0.04)' },
          border: { display: false },
          title: { display: true, text: 'Days', color: '#616161', font: { size: 10, family: 'Segoe UI' } },
        }
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#ffffff',
          borderColor: '#e1dfdd',
          borderWidth: 1,
          titleColor: '#242424',
          bodyColor: '#616161',
          padding: 12,
          titleFont: { family: 'Segoe UI', size: 13, weight: '600' },
          bodyFont: { family: 'Segoe UI', size: 12 },
          boxPadding: 4,
          callbacks: {
            title: items => items[0].label,
            label: item => {
              if (item.raw === null || item.raw === undefined) return null;
              const config = item.chart.config.data.stagesConfig[item.dataIndex];
              const cases = item.dataset.cases[item.dataIndex];
              return [
                ` Total Cases: ${cases}`,
                ` Current Median: ${item.raw}d`,
                ` Overall Median: ${config.avg}d`,
                ` SLA Limit: ${config.sla}d`
              ];
            }
          }
        }
      },
      animation: { duration: 700 }
    }
  });
}

document.addEventListener('DOMContentLoaded', function() {
  const milestoneFilter = document.getElementById('milestoneFilter');
  
  // Initial render with All Milestones
  renderChart(milestoneFilter.value);

  // Filter change listener
  milestoneFilter.addEventListener('change', (e) => {
    renderChart(e.target.value);
  });
});
</script>
</body>
</html>
